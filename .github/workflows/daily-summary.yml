name: Daily AI News Summary

on:
  schedule:
    # UTC 00:17 = 北京时间 08:17 (避开整点高峰)
    - cron: '17 0 * * *'
  workflow_dispatch:      # 允许手动触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Horizon dependencies
        working-directory: Horizon
        run: uv sync --extra twitter

      - name: Install Playwright Chromium
        working-directory: Horizon
        run: uv run playwright install chromium --with-deps

      - name: Prepare CI config
        working-directory: Horizon
        run: cp data/config.ci.json data/config.json

      - name: Restore Twitter Cookies
        working-directory: Horizon
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: |
          if [ -n "$TWITTER_COOKIES" ]; then
            echo "$TWITTER_COOKIES" > data/x_cookies.json
            echo "Twitter cookies restored."
          else
            echo "No TWITTER_COOKIES secret set, Twitter will be skipped."
          fi

      - name: Run Horizon
        working-directory: Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours 24

      - name: Archive to AI日报 folder
        run: |
          # Clean Jekyll frontmatter for Obsidian compatibility
          for f in Horizon/docs/_posts/*-summary-zh.md; do
            [ -f "$f" ] || continue
            basename=$(basename "$f")
            sed '/^layout:/d' "$f" > "AI日报/$basename"
            echo "Archived: AI日报/$basename"
          done
          # Also archive English version
          for f in Horizon/docs/_posts/*-summary-en.md; do
            [ -f "$f" ] || continue
            basename=$(basename "$f")
            sed '/^layout:/d' "$f" > "AI日报/$basename"
            echo "Archived: AI日报/$basename"
          done

      - name: Commit AI日报 to main branch
        run: |
          git config user.name "Horizon AI Bot"
          git config user.email "bot@horizon.ai"
          git add AI日报/
          git diff --staged --quiet || git commit -m "📝 AI日报 $(date +'%Y-%m-%d')"
          git push origin main

      - name: Get date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Horizon/docs
          keep_files: true
          commit_message: "📝 Daily AI Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
